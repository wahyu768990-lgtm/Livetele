name: Nobar Stream All-in-One

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link, Link Google Drive, atau M3U8'
        required: true
        default: ''
      stream_method:
        description: 'Metode Streaming'
        required: true
        type: choice
        options:
          - 'download_first'
          - 'direct_stream'
        default: 'direct_stream'
      quality:
        description: 'Kualitas Video'
        required: true
        type: choice
        options:
          - '1080p'
          - 'auto'
        default: 'auto'
      custom_rtmp:
        description: 'Custom RTMP (Kosongkan jika ke Telegram)'
        required: false
        default: ''

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg aria2
          pip install telethon requests

      - name: Download Video (Jika metode download_first)
        if: github.event.inputs.stream_method == 'download_first'
        run: |
          python3 - << 'EOF'
          import os, re, requests

          url = "${{ github.event.inputs.video_url }}"
          filename = "film_lokal.mkv"
          session = requests.Session()

          # Deteksi ID Drive
          drive_match = re.search(r'(?:id=|\/d\/|folders\/)([a-zA-Z0-9_-]{25,})', url)

          if "drive.google.com" in url and drive_match:
              file_id = drive_match.group(1)
              print(f"🚀 GDrive ID Terdeteksi: {file_id}")

              base_url = "https://drive.google.com/uc?export=download"
              res = session.get(base_url, params={'id': file_id})

              confirm_token = ""
              for key, value in session.cookies.get_dict().items():
                  if key.startswith("download_warning"):
                      confirm_token = value

              if not confirm_token:
                  match = re.search(r'name="confirm" value="([^"]+)"', res.text)
                  confirm_token = match.group(1) if match else "t"

              download_url = f"https://drive.usercontent.google.com/download?id={file_id}&export=download&confirm={confirm_token}"
          else:
              download_url = url
              print("🔗 Menggunakan Direct Link...")

          # Test 5MB
          print("🛠️ Testing download 5MB pertama...")
          with session.get(download_url, stream=True) as r:
              r.raise_for_status()
              with open(filename, 'wb') as f:
                  downloaded = 0
                  for chunk in r.iter_content(chunk_size=8192):
                      if chunk:
                          f.write(chunk)
                          downloaded += len(chunk)
                          if downloaded >= 5 * 1024 * 1024: break
          print("✅ Test 5MB Berhasil!")

          # Pakai Aria2
          cookie_str = "; ".join([f"{k}={v}" for k, v in session.cookies.get_dict().items()])
          print("🚀 Melanjutkan sisa download dengan Aria2c...")
          os.system(f'aria2c -c -x 16 -s 16 -j 5 --header="Cookie: {cookie_str}" "{download_url}" -o "{filename}"')
          EOF

      - name: Run Auto Streamer
        env:
          API_ID: 27095962
          API_HASH: '2a6a2a3d4bb616f254325bdc5007496d'
          STRING_SESSION: '1BVtsOHABu8YLZZ-e0n0HBjd7CZHOtCIreRto5IulVtonWOjACzFNaw2VtcsLyIwserSdDdldwIIxJ0rfKciVSWiWSsEwgvSKJZ4T5Dven4qjp_9n5IwITQjy4nERcjlpzDEO8F6UUuJchb3_L3Gjrck8r0G74GaZVMgP-Ufwf86wklONhtp96-N0sQSKlAVZVn2mdDFd81vjPyfiO5mATUnWJza2jFW-dlbWwXFaQ4HQ2z7y36QWMIfGjfZdk4Svhtv4DqhALDzQ_niujQRvHNRhAWroxeNhyZMPAG2klPfSMeRjsl8wfx3I0k2oVcLFasAZFIy8FFwKZvb6vxC-l01L4spV54c='
          TARGET_CHAT: 'aiahwhsushe'
          CUSTOM_RTMP: ${{ github.event.inputs.custom_rtmp }}
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          STREAM_METHOD: ${{ github.event.inputs.stream_method }}
          QUALITY: ${{ github.event.inputs.quality }}
        run: |
          cat << 'EOF' > streamer.py
          import asyncio
          import os
          import subprocess
          import re
          import json
          from telethon import TelegramClient, functions
          from telethon.sessions import StringSession

          API_ID = int(os.environ.get("API_ID"))
          API_HASH = os.environ.get("API_HASH")
          STRING_SESSION = os.environ.get("STRING_SESSION")
          TARGET_CHAT = os.environ.get("TARGET_CHAT")
          CUSTOM_RTMP = os.environ.get("CUSTOM_RTMP")
          VIDEO_URL = os.environ.get("VIDEO_URL")
          STREAM_METHOD = os.environ.get("STREAM_METHOD")
          QUALITY = os.environ.get("QUALITY")

          VIDEO_INPUT = "film_lokal.mkv" if STREAM_METHOD == 'download_first' else VIDEO_URL

          def get_video_metadata():
              print("Mengambil metadata video...")
              cmd = [
                  "ffprobe", "-v", "quiet", "-print_format", "json",
                  "-show_format", "-show_streams", VIDEO_INPUT
              ]
              
              meta_info = "Tidak diketahui"
              duration_info = "Tidak diketahui"
              
              try:
                  res = subprocess.run(cmd, capture_output=True, text=True)
                  data = json.loads(res.stdout)
                  
                  video_streams = [s for s in data.get('streams', []) if s.get('codec_type') == 'video']
                  if video_streams:
                      best_stream = sorted(video_streams, key=lambda x: x.get('width', 0), reverse=True)[0]
                      
                      width = best_stream.get('width', '?')
                      height = best_stream.get('height', '?')
                      codec = best_stream.get('codec_name', '?').upper()
                      meta_info = f"{width}x{height} ({codec})"
                  
                  format_info = data.get('format', {})
                  duration = float(format_info.get('duration', 0))
                  if duration > 0:
                      m, s = divmod(int(duration), 60)
                      h, m = divmod(m, 60)
                      duration_info = f"{h:02d}:{m:02d}:{s:02d}"
                      
              except Exception as e:
                  print(f"Gagal mengambil metadata: {e}")
                  
              return meta_info, duration_info

          async def get_rtmp():
              full_rtmp = CUSTOM_RTMP
              client = TelegramClient(StringSession(STRING_SESSION), API_ID, API_HASH)
              await client.connect()
              
              try:
                  if not (full_rtmp and full_rtmp.strip()):
                      entity = await client.get_entity(TARGET_CHAT)
                      try: 
                          title = "NOBAR 1080p" if QUALITY == '1080p' else "NOBAR (Auto HD)"
                          await client(functions.phone.CreateGroupCallRequest(peer=entity, title=title, rtmp_stream=True))
                      except: 
                          pass
                      call = await client(functions.phone.GetGroupCallStreamRtmpUrlRequest(peer=entity, revoke=False))
                      full_rtmp = f"{call.url}{call.key}"
                  
                  if not full_rtmp:
                      return None
                      
                  meta_info, duration_info = get_video_metadata()
                  
                  pesan = (
                      f"🎬 **STREAMING DIMULAI** 🎬\n\n"
                      f"🎥 **Resolusi Asli:** `{meta_info}`\n"
                      f"⏱ **Durasi:** `{duration_info}`\n"
                      f"⚙️ **Kualitas Output:** `{'1080p (Max 5000kbps)' if QUALITY == '1080p' else 'Menyesuaikan Sumber (Max 4000kbps)'}`\n\n"
                      f"🍿 *Selamat menonton! Jangan lupa siapkan camilan.*"
                  )
                  await client.send_message(TARGET_CHAT, pesan)
                  print("Pesan notifikasi berhasil dikirim!")
                  
              except Exception as e:
                  print(f"Ada kendala saat setup/kirim pesan: {e}")
              finally:
                  await client.disconnect()
                  
              return full_rtmp

          async def main():
              full_rtmp = await get_rtmp()
              if not full_rtmp: 
                  print("Gagal mendapatkan RTMP URL. Berhenti.")
                  return
              
              print(f"Streaming dimulai...")
              last_ts = "00:00:00"
              while True:
                  ffmpeg_cmd = [
                      "ffmpeg", "-ss", last_ts, "-re", "-i", VIDEO_INPUT,
                  ]
                  
                  if QUALITY == '1080p':
                      ffmpeg_cmd.extend([
                          "-map", "0:v:0", "-map", "0:a:0",
                          "-vf", "scale=1920:-2",
                          "-c:v", "libx264", "-preset", "veryfast",
                          "-b:v", "5000k", "-maxrate", "5000k", "-bufsize", "10000k",
                          "-pix_fmt", "yuv420p", "-g", "60",
                          "-c:a", "aac", "-b:a", "160k", "-ac", "2", "-ar", "44100",
                          "-af", "aresample=async=1"
                      ])
                  else:
                      ffmpeg_cmd.extend([
                          "-c:v", "libx264", "-preset", "veryfast",
                          "-b:v", "3500k", "-maxrate", "4000k", "-bufsize", "8000k",
                          "-pix_fmt", "yuv420p", "-g", "60",
                          "-c:a", "aac", "-b:a", "128k", "-ac", "2", "-ar", "44100",
                          "-af", "aresample=async=1"
                      ])

                  ffmpeg_cmd.extend(["-f", "flv", full_rtmp])

                  proc = subprocess.Popen(ffmpeg_cmd, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, universal_newlines=True)
                  for line in proc.stdout:
                      match = re.search(r"time=(\d{2}:\d{2}:\d{2})", line)
                      if match: last_ts = match.group(1)
                      if "frame=" in line: print(f"\rStatus: Streaming {QUALITY} | Time: {last_ts}", end="")
                  
                  proc.wait()
                  if proc.returncode == 0: break
                  await asyncio.sleep(5)

          if __name__ == '__main__':
              asyncio.run(main())
          EOF
          python3 streamer.py
