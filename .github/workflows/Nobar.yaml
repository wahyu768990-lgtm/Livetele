name: Nobar Stream All-in-One

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link, Link Google Drive, atau M3U8'
        required: true
        default: 'https://drive.google.com/uc?id=1ddFW6aV5dJxhV2wdfmEFf4K48d4G9MFA&export=download'
      quality:
        description: 'Kualitas Video'
        required: true
        type: choice
        options:
          - '1080p'
          - 'auto'
        default: 'auto'
      custom_rtmp:
        description: 'Custom RTMP (Kosongkan jika ke Telegram)'
        required: false
        default: ''

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg aria2
          pip install telethon requests

      - name: Smart Download & Auto Streamer
        env:
          API_ID: 27095962
          API_HASH: '2a6a2a3d4bb616f254325bdc5007496d'
          STRING_SESSION: '1BVtsOHABu8YLZZ-e0n0HBjd7CZHOtCIreRto5IulVtonWOjACzFNaw2VtcsLyIwserSdDdldwIIxJ0rfKciVSWiWSsEwgvSKJZ4T5Dven4qjp_9n5IwITQjy4nERcjlpzDEO8F6UUuJchb3_L3Gjrck8r0G74GaZVMgP-Ufwf86wklONhtp96-N0sQSKlAVZVn2mdDFd81vjPyfiO5mATUnWJza2jFW-dlbWwXFaQ4HQ2z7y36QWMIfGjfZdk4Svhtv4DqhALDzQ_niujQRvHNRhAWroxeNhyZMPAG2klPfSMeRjsl8wfx3I0k2oVcLFasAZFIy8FFwKZvb6vxC-l01L4spV54c='
          TARGET_CHAT: 'aiahwhsushe'
          CUSTOM_RTMP: ${{ github.event.inputs.custom_rtmp }}
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          QUALITY: ${{ github.event.inputs.quality }}
        run: |
          cat << 'EOF' > streamer.py
          import asyncio
          import os
          import subprocess
          import re
          import json
          import requests
          from pathlib import Path
          from urllib.parse import urlparse, unquote
          from telethon import TelegramClient, functions
          from telethon.sessions import StringSession

          API_ID = int(os.environ.get("API_ID"))
          API_HASH = os.environ.get("API_HASH")
          STRING_SESSION = os.environ.get("STRING_SESSION")
          TARGET_CHAT = os.environ.get("TARGET_CHAT")
          CUSTOM_RTMP = os.environ.get("CUSTOM_RTMP", "").strip()
          VIDEO_URL = os.environ.get("VIDEO_URL", "").strip()
          QUALITY = os.environ.get("QUALITY", "auto").strip()

          STREAM_METHOD = "direct_stream"
          VIDEO_INPUT = VIDEO_URL
          IS_LOCAL_FILE = False

          def sanitize_filename(name):
              name = re.sub(r'[\\/:*?"<>|]+', ' ', name)
              name = re.sub(r'\s+', ' ', name).strip()
              return name or "film_lokal"

          def guess_title_from_url(url):
              parsed = urlparse(url)
              name = Path(unquote(parsed.path)).stem
              if name and name not in ("download", "uc"):
                  return sanitize_filename(name)
              return "Unknown Title"

          def guess_ext_from_url(url):
              parsed = urlparse(url)
              suffix = Path(unquote(parsed.path)).suffix.lower()
              if suffix in [".mp4", ".mkv", ".mov", ".webm", ".m4v", ".ts"]:
                  return suffix
              return ".mp4"

          def get_drive_direct_url(video_url):
              session = requests.Session()
              drive_match = re.search(r'(?:id=|\/d\/)([a-zA-Z0-9_-]{25,})', video_url)
              if drive_match:
                  file_id = drive_match.group(1)
                  base_url = "https://drive.google.com/uc?export=download"
                  res = session.get(base_url, params={'id': file_id}, allow_redirects=True)

                  confirm_token = ""
                  for key, value in session.cookies.get_dict().items():
                      if key.startswith("download_warning"):
                          confirm_token = value

                  if not confirm_token:
                      match = re.search(r'name="confirm" value="([^"]+)"', res.text)
                      confirm_token = match.group(1) if match else "t"

                  uuid_match = re.search(r'name="uuid" value="([^"]+)"', res.text)
                  uuid = uuid_match.group(1) if uuid_match else ""

                  if uuid:
                      return (
                          f"https://drive.usercontent.google.com/download?id={file_id}&export=download&confirm={confirm_token}&uuid={uuid}",
                          session.cookies.get_dict()
                      )
                  else:
                      return (
                          f"https://drive.usercontent.google.com/download?id={file_id}&export=download&confirm={confirm_token}",
                          session.cookies.get_dict()
                      )

              return video_url, {}

          if ".m3u8" in VIDEO_URL.lower():
              print("🔍 Deteksi: Link M3U8. Menggunakan metode Direct Stream.")
              STREAM_METHOD = "direct_stream"
          elif "drive.google.com" in VIDEO_URL or "drive.usercontent.google.com" in VIDEO_URL or re.search(r'(?:id=|\/d\/)([a-zA-Z0-9_-]{25,})', VIDEO_URL):
              print("🔍 Deteksi: Link Google Drive. Menggunakan metode Download First.")
              STREAM_METHOD = "download_first"
          else:
              print("🔍 Deteksi: Direct Link / MP4 / MKV. Menggunakan metode Download First.")
              STREAM_METHOD = "download_first"

          if STREAM_METHOD == "download_first":
              filename = f"film_lokal{guess_ext_from_url(VIDEO_URL)}"
              VIDEO_INPUT = filename
              IS_LOCAL_FILE = True

              if "drive.google.com" in VIDEO_URL or "drive.usercontent.google.com" in VIDEO_URL:
                  download_url, cookies = get_drive_direct_url(VIDEO_URL)
              else:
                  download_url, cookies = VIDEO_URL, {}

              cookie_str = "; ".join([f"{k}={v}" for k, v in cookies.items()])
              print(f"🚀 Memulai download dengan Aria2c ke {filename}...")
              print(f"🔗 URL Download: {download_url}")

              cmd = [
                  "aria2c",
                  "-c",
                  "-x", "16",
                  "-s", "16",
                  "-j", "5",
                  "--summary-interval=0",
                  "--auto-file-renaming=false",
              ]

              if cookie_str:
                  cmd.append(f"--header=Cookie: {cookie_str}")

              cmd.extend([
                  "-o", filename,
                  download_url
              ])

              subprocess.run(cmd, check=True)
              print("✅ Download selesai!")

          def get_video_metadata():
              print("📦 Mengambil metadata video...")
              cmd = [
                  "ffprobe", "-v", "quiet", "-print_format", "json",
                  "-show_format", "-show_streams", VIDEO_INPUT
              ]

              title_info = guess_title_from_url(VIDEO_URL)
              meta_info = "Tidak diketahui"
              duration_info = "Tidak diketahui"
              quality_info = "Unknown"
              source_height = 0

              try:
                  res = subprocess.run(cmd, capture_output=True, text=True, check=True)
                  data = json.loads(res.stdout)

                  video_streams = [s for s in data.get("streams", []) if s.get("codec_type") == "video"]
                  if video_streams:
                      best_stream = sorted(video_streams, key=lambda x: x.get("height", 0), reverse=True)[0]

                      width = best_stream.get("width", "?")
                      height = best_stream.get("height", "?")
                      codec = str(best_stream.get("codec_name", "?")).upper()
                      meta_info = f"{width}x{height} ({codec})"

                      if isinstance(height, int):
                          quality_info = f"{height}p"
                          source_height = height

                  format_info = data.get("format", {})
                  duration_raw = format_info.get("duration")
                  if duration_raw:
                      duration = float(duration_raw)
                      if duration > 0:
                          m, s = divmod(int(duration), 60)
                          h, m = divmod(m, 60)
                          duration_info = f"{h:02d}:{m:02d}:{s:02d}"

                  ff_title = format_info.get("tags", {}).get("title")
                  if ff_title and ff_title.strip():
                      title_info = sanitize_filename(ff_title.strip())
                  elif IS_LOCAL_FILE:
                      title_info = sanitize_filename(Path(VIDEO_INPUT).stem)

              except Exception as e:
                  print(f"⚠️ Gagal mengambil metadata: {e}")

              return title_info, meta_info, duration_info, quality_info, source_height

          async def get_rtmp():
              full_rtmp = CUSTOM_RTMP
              client = TelegramClient(StringSession(STRING_SESSION), API_ID, API_HASH)
              await client.connect()

              try:
                  title_info, meta_info, duration_info, quality_info, source_height = get_video_metadata()

                  if not (full_rtmp and full_rtmp.strip()):
                      entity = await client.get_entity(TARGET_CHAT)
                      try:
                          call_title = f"{title_info} | {quality_info}"
                          await client(functions.phone.CreateGroupCallRequest(
                              peer=entity,
                              title=call_title[:120],
                              rtmp_stream=True
                          ))
                      except Exception:
                          pass

                      call = await client(functions.phone.GetGroupCallStreamRtmpUrlRequest(peer=entity, revoke=False))
                      full_rtmp = f"{call.url}{call.key}"

                  if not full_rtmp:
                      return None

                  if QUALITY == "auto":
                      output_quality_text = f"Auto ({quality_info})"
                  else:
                      if source_height and source_height < 1080:
                          output_quality_text = f"1080p requested, source hanya {quality_info}"
                      else:
                          output_quality_text = "1080p"

                  pesan = (
                      f"🎬 **STREAMING DIMULAI** 🎬\n\n"
                      f"🏷 **Judul:** `{title_info}`\n"
                      f"🎥 **Resolusi Sumber:** `{meta_info}`\n"
                      f"📺 **Kualitas Sumber:** `{quality_info}`\n"
                      f"⏱ **Durasi:** `{duration_info}`\n"
                      f"⚙️ **Kualitas Output:** `{output_quality_text}`\n\n"
                      f"🍿 *Selamat menonton! Jangan lupa siapkan camilan.*"
                  )
                  await client.send_message(TARGET_CHAT, pesan)
                  print("✅ Pesan notifikasi berhasil dikirim!")

              except Exception as e:
                  print(f"⚠️ Ada kendala saat setup/kirim pesan: {e}")
              finally:
                  await client.disconnect()

              return full_rtmp

          async def main():
              full_rtmp = await get_rtmp()
              if not full_rtmp:
                  print("❌ Gagal mendapatkan RTMP URL. Berhenti.")
                  return

              print("🚀 Streaming dimulai...")
              last_ts = "00:00:00"

              while True:
                  ffmpeg_cmd = ["ffmpeg", "-y"]

                  if IS_LOCAL_FILE and last_ts != "00:00:00":
                      ffmpeg_cmd.extend(["-ss", last_ts])

                  ffmpeg_cmd.extend(["-re", "-i", VIDEO_INPUT])

                  if QUALITY == "1080p":
                      ffmpeg_cmd.extend([
                          "-map", "0:v:0", "-map", "0:a:0?",
                          "-vf", "scale=1920:-2",
                          "-c:v", "libx264", "-preset", "veryfast",
                          "-b:v", "5000k", "-maxrate", "5000k", "-bufsize", "10000k",
                          "-pix_fmt", "yuv420p", "-g", "60",
                          "-c:a", "aac", "-b:a", "160k", "-ac", "2", "-ar", "44100",
                          "-af", "aresample=async=1"
                      ])
                  else:
                      ffmpeg_cmd.extend([
                          "-map", "0:v:0", "-map", "0:a:0?",
                          "-c:v", "libx264", "-preset", "veryfast",
                          "-b:v", "3500k", "-maxrate", "4000k", "-bufsize", "8000k",
                          "-pix_fmt", "yuv420p", "-g", "60",
                          "-c:a", "aac", "-b:a", "128k", "-ac", "2", "-ar", "44100",
                          "-af", "aresample=async=1"
                      ])

                  ffmpeg_cmd.extend(["-f", "flv", full_rtmp])

                  proc = subprocess.Popen(
                      ffmpeg_cmd,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.STDOUT,
                      universal_newlines=True
                  )

                  for line in proc.stdout:
                      match = re.search(r"time=(\d{2}:\d{2}:\d{2})", line)
                      if match:
                          last_ts = match.group(1)
                      if "frame=" in line:
                          print(f"\rStatus: Streaming {QUALITY} | Time: {last_ts}", end="")

                  proc.wait()
                  if proc.returncode == 0:
                      print("\n✅ Streaming selesai.")
                      break

                  print(f"\n⚠️ FFmpeg berhenti dengan code {proc.returncode}, mencoba lanjut dari {last_ts}...")
                  await asyncio.sleep(5)

          if __name__ == '__main__':
              asyncio.run(main())
          EOF
          python3 streamer.py
