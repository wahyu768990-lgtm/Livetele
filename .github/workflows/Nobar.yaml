name: Nobar Stream Ultimate (Auto Subtitle Extraction)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link / Google Drive / M3U8'
        required: true
        default: 'https://drive.google.com/uc?id=1ddFW6aV5dJxhV2wdfmEFf4K48d4G9MFA&export=download'
      quality:
        description: 'Kualitas Video'
        required: true
        type: choice
        options: [ '1080p', 'auto' ]
        default: 'auto'
      use_subtitle:
        description: 'Gunakan Subtitle Indonesia?'
        required: true
        type: choice
        options: [ 'true', 'false' ]
        default: 'true'
      subtitle_track:
        description: 'Track subtitle relatif (auto / 0 / 1 / 2 ...)'
        required: true
        default: 'auto'
      custom_rtmp:
        description: 'Custom RTMP (Kosongkan jika ke Telegram)'
        required: false
        default: ''

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg aria2
          pip install telethon requests

      - name: Smart Download, Subtitle Extract & Stream
        env:
          API_ID: 27095962
          API_HASH: '2a6a2a3d4bb616f254325bdc5007496d'
          STRING_SESSION: '1BVtsOHABu8YLZZ-e0n0HBjd7CZHOtCIreRto5IulVtonWOjACzFNaw2VtcsLyIwserSdDdldwIIxJ0rfKciVSWiWSsEwgvSKJZ4T5Dven4qjp_9n5IwITQjy4nERcjlpzDEO8F6UUuJchb3_L3Gjrck8r0G74GaZVMgP-Ufwf86wklONhtp96-N0sQSKlAVZVn2mdDFd81vjPyfiO5mATUnWJza2jFW-dlbWwXFaQ4HQ2z7y36QWMIfGjfZdk4Svhtv4DqhALDzQ_niujQRvHNRhAWroxeNhyZMPAG2klPfSMeRjsl8wfx3I0k2oVcLFasAZFIy8FFwKZvb6vxC-l01L4spV54c='
          TARGET_CHAT: 'aiahwhsushe'
          CUSTOM_RTMP: ${{ github.event.inputs.custom_rtmp }}
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          QUALITY: ${{ github.event.inputs.quality }}
          USE_SUBTITLE: ${{ github.event.inputs.use_subtitle }}
          SUBTITLE_TRACK: ${{ github.event.inputs.subtitle_track }}
        run: |
          cat << 'EOF' > streamer.py
          import asyncio
          import os
          import subprocess
          import re
          import json
          import requests
          from pathlib import Path
          from urllib.parse import urlparse, unquote
          from telethon import TelegramClient, functions
          from telethon.sessions import StringSession

          API_ID = int(os.environ.get("API_ID"))
          API_HASH = os.environ.get("API_HASH")
          STRING_SESSION = os.environ.get("STRING_SESSION")
          TARGET_CHAT = os.environ.get("TARGET_CHAT")
          CUSTOM_RTMP = os.environ.get("CUSTOM_RTMP", "").strip()
          VIDEO_URL = os.environ.get("VIDEO_URL", "").strip()
          QUALITY = os.environ.get("QUALITY", "auto").strip()
          USE_SUBTITLE = os.environ.get("USE_SUBTITLE", "false").lower() == "true"
          SUBTITLE_TRACK = os.environ.get("SUBTITLE_TRACK", "auto").strip().lower()

          FONTS_DIR = "fonts_extracted"
          VIDEO_FILENAME = "film_lokal.mp4"

          def sanitize(name):
              return re.sub(r'[\\/:*?"<>|]+', ' ', name).strip()

          def ffmpeg_escape_filter_path(path: str) -> str:
              return (
                  path.replace("\\", "\\\\")
                      .replace(":", r"\:")
                      .replace("'", r"\'")
                      .replace("[", r"\[")
                      .replace("]", r"\]")
                      .replace(",", r"\,")
              )

          def get_filename_and_url(url):
              final_url = url
              filename = "video_stream"
              cookies = {}

              # Drive Link Handling
              drive_match = re.search(r'(?:id=|\/d\/)([a-zA-Z0-9_-]{25,})', url)
              if drive_match:
                  file_id = drive_match.group(1)
                  base_url = "https://drive.google.com/uc?export=download"
                  session = requests.Session()
                  res = session.get(base_url, params={'id': file_id})
                  token = next((v for k, v in session.cookies.get_dict().items() if k.startswith("download_warning")), "")
                  if not token:
                      match = re.search(r'name="confirm" value="([^"]+)"', res.text)
                      token = match.group(1) if match else "t"
                  final_url = f"https://drive.usercontent.google.com/download?id={file_id}&export=download&confirm={token}"
                  cookies = session.cookies.get_dict()

              try:
                  with requests.get(final_url, cookies=cookies, stream=True, allow_redirects=True, timeout=10) as r:
                      cd = r.headers.get('content-disposition')
                      if cd:
                          fname = re.findall('filename="(.+?)"', cd)
                          if not fname:
                              fname = re.findall("filename\\*=UTF-8''(.+)", cd)
                          if fname:
                              filename = unquote(fname[0])
                      else:
                          filename = Path(unquote(urlparse(r.url).path)).name or "video_stream"
              except:
                  pass

              filename = sanitize(filename)
              if not Path(filename).suffix:
                  filename += ".mp4"
              return filename, final_url, cookies

          # 1. Start Process
          if ".m3u8" in VIDEO_URL.lower():
              VIDEO_INPUT = VIDEO_URL
              IS_LOCAL = False
          else:
              VIDEO_FILENAME, DL_URL, COOKIES = get_filename_and_url(VIDEO_URL)
              VIDEO_INPUT = VIDEO_FILENAME
              IS_LOCAL = True
              print(f"📦 Downloading: {VIDEO_FILENAME}")
              c_str = "; ".join([f"{k}={v}" for k, v in COOKIES.items()])
              cmd = ["aria2c", "-c", "-x", "16", "-s", "16", "-j", "5", "-o", VIDEO_FILENAME, DL_URL]
              if c_str:
                  cmd.insert(1, f"--header=Cookie: {c_str}")
              subprocess.run(cmd, check=True)

          def get_stream_data():
              cmd = ["ffprobe", "-v", "quiet", "-print_format", "json", "-show_streams", VIDEO_INPUT]
              res = subprocess.run(cmd, capture_output=True, text=True)
              data = json.loads(res.stdout or "{}")

              info = {
                  "sub_stream_idx": -1,   # absolute stream index
                  "sub_rel_idx": -1,      # relative subtitle index untuk subtitles=:si=
                  "has_fonts": False,
                  "sub_codec": "ass"
              }

              streams = data.get("streams", [])
              sub_streams = [s for s in streams if s.get("codec_type") == "subtitle"]

              if any(s.get("codec_type") == "attachment" for s in streams):
                  info["has_fonts"] = True

              print("\n=== STREAM INFO ===")
              for s in streams:
                  tags = s.get("tags", {}) or {}
                  print(
                      f"index={s.get('index')} "
                      f"type={s.get('codec_type')} "
                      f"codec={s.get('codec_name')} "
                      f"lang={tags.get('language', '-')} "
                      f"title={tags.get('title', '-')}"
                  )

              if USE_SUBTITLE:
                  print("\n=== SUBTITLE TRACK LIST ===")
                  for rel_idx, s in enumerate(sub_streams):
                      tags = s.get("tags", {}) or {}
                      lang = (tags.get("language") or "").lower()
                      title = (tags.get("title") or "").lower()
                      codec = s.get("codec_name", "unknown")
                      abs_idx = s.get("index")
                      print(f"[track {rel_idx}] abs={abs_idx} codec={codec} lang={lang or '-'} title={title or '-'}")

                  # Manual select: subtitle_track = 0/1/2/...
                  if SUBTITLE_TRACK != "auto":
                      try:
                          wanted = int(SUBTITLE_TRACK)
                          if 0 <= wanted < len(sub_streams):
                              s = sub_streams[wanted]
                              info["sub_rel_idx"] = wanted
                              info["sub_stream_idx"] = s["index"]
                              info["sub_codec"] = s.get("codec_name", "ass")
                              print(f"✅ Manual subtitle selected: track {wanted} (abs #{s['index']})")
                              return info
                          else:
                              print(f"⚠️ SUBTITLE_TRACK={wanted} di luar range. Fallback ke auto.")
                      except:
                          print("⚠️ SUBTITLE_TRACK tidak valid. Fallback ke auto.")

                  # Auto detect subtitle Indonesia
                  for rel_idx, s in enumerate(sub_streams):
                      tags = s.get("tags", {}) or {}
                      lang = (tags.get("language") or "").lower()
                      title = (tags.get("title") or "").lower()

                      if (
                          lang in ["ind", "id", "idn", "indonesian"] or
                          "indo" in title or
                          "indonesia" in title
                      ):
                          info["sub_rel_idx"] = rel_idx
                          info["sub_stream_idx"] = s["index"]
                          info["sub_codec"] = s.get("codec_name", "ass")
                          print(f"✅ Found Indo Sub at subtitle track {rel_idx} (abs stream #{s['index']})")
                          return info

                  print("⚠️ Subtitle Indonesia tidak ditemukan.")
              return info

          async def main():
              info = get_stream_data()
              font_path = None

              # Extract Fonts
              if info["has_fonts"] and IS_LOCAL:
                  os.makedirs(FONTS_DIR, exist_ok=True)
                  print("🎨 Extracting fonts...")
                  subprocess.run(
                      ["ffmpeg", "-dump_attachment:t", "", "-i", os.path.abspath(VIDEO_INPUT)],
                      cwd=FONTS_DIR,
                      stderr=subprocess.DEVNULL
                  )
                  font_path = os.path.abspath(FONTS_DIR)

              # Telegram Session
              client = TelegramClient(StringSession(STRING_SESSION), API_ID, API_HASH)
              await client.connect()
              full_rtmp = CUSTOM_RTMP
              if not full_rtmp:
                  entity = await client.get_entity(TARGET_CHAT)
                  try:
                      await client(functions.phone.CreateGroupCallRequest(peer=entity, title=VIDEO_FILENAME, rtmp_stream=True))
                  except:
                      pass
                  call = await client(functions.phone.GetGroupCallStreamRtmpUrlRequest(peer=entity, revoke=False))
                  full_rtmp = f"{call.url}{call.key}"

              await client.send_message(
                  TARGET_CHAT,
                  f"🎬 **STREAM STARTED**\n🏷 `{VIDEO_FILENAME}`\n💬 Subtitle: `{'Indonesia' if info['sub_rel_idx'] != -1 else 'None'}`"
              )
              await client.disconnect()

              # FFmpeg Stream
              last_ts = "00:00:00"
              while True:
                  vf = []
                  if QUALITY == "1080p":
                      vf.append("scale=1920:-2")

                  # Burn subtitle langsung dari file lokal
                  if info["sub_rel_idx"] != -1 and IS_LOCAL:
                      video_path = ffmpeg_escape_filter_path(os.path.abspath(VIDEO_INPUT))
                      sub_cmd = f"subtitles=filename='{video_path}':si={info['sub_rel_idx']}"
                      if font_path:
                          fonts_path = ffmpeg_escape_filter_path(font_path)
                          sub_cmd += f":fontsdir='{fonts_path}'"
                      vf.append(sub_cmd)
                      print(f"📝 Burning subtitle track {info['sub_rel_idx']} (abs #{info['sub_stream_idx']})")

                  cmd = ["ffmpeg", "-y", "-re"]
                  if IS_LOCAL and last_ts != "00:00:00":
                      cmd.extend(["-ss", last_ts])
                  cmd.extend(["-i", VIDEO_INPUT])

                  if vf:
                      cmd.extend(["-vf", ",".join(vf)])

                  br = "5000k" if QUALITY == "1080p" else "3500k"
                  cmd.extend([
                      "-c:v", "libx264", "-preset", "veryfast", "-b:v", br, "-maxrate", br, "-bufsize", "8000k",
                      "-pix_fmt", "yuv420p", "-g", "60", "-c:a", "aac", "-b:a", "128k", "-f", "flv", full_rtmp
                  ])

                  proc = subprocess.Popen(
                      cmd,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.STDOUT,
                      universal_newlines=True
                  )

                  for line in proc.stdout:
                      t = re.search(r"time=(\d{2}:\d{2}:\d{2})", line)
                      if t:
                          last_ts = t.group(1)
                      if "frame=" in line:
                          print(f"\rStreaming: {last_ts}", end="")

                  if proc.wait() == 0:
                      break
                  await asyncio.sleep(5)

          if __name__ == '__main__':
              asyncio.run(main())
          EOF

          python3 streamer.py
