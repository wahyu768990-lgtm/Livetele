name: Auto Nobar Stream (Telethon + FFmpeg)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link Video'
        required: true
        default: 'https://tipigd.tipikug.workers.dev/0:/Me/Pencarian.Terakhir.2025.1080p.NF.WEB-DL.DDP5.1.H.264-KQRM.mkv'

jobs:
  stream:
    runs-on: ubuntu-latest
    # Set timeout 6 jam (360 menit) agar cukup untuk film durasi panjang
    timeout-minutes: 360 

    steps:
      - name: Install FFmpeg & Telethon
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install telethon

      - name: Run Auto Streamer
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
        run: |
          cat << 'EOF' > streamer.py
          import asyncio
          import os
          import subprocess
          import sys
          from telethon import TelegramClient, functions
          from telethon.sessions import StringSession

          # --- DATA DARI USER ---
          API_ID = 27095962
          API_HASH = '2a6a2a3d4bb616f254325bdc5007496d'
          STRING_SESSION = '1BVtsOHABu8YLZZ-e0n0HBjd7CZHOtCIreRto5IulVtonWOjACzFNaw2VtcsLyIwserSdDdldwIIxJ0rfKciVSWiWSsEwgvSKJZ4T5Dven4qjp_9n5IwITQjy4nERcjlpzDEO8F6UUuJchb3_L3Gjrck8r0G74GaZVMgP-Ufwf86wklONhtp96-N0sQSKlAVZVn2mdDFd81vjPyfiO5mATUnWJza2jFW-dlbWwXFaQ4HQ2z7y36QWMIfGjfZdk4Svhtv4DqhALDzQ_niujQRvHNRhAWroxeNhyZMPAG2klPfSMeRjsl8wfx3I0k2oVcLFasAZFIy8FFwKZvb6vxC-l01L4spV54c='
          TARGET_CHAT = 'aiahwhsushe' 
          VIDEO_URL = os.environ.get("VIDEO_URL")

          async def main():
              client = TelegramClient(StringSession(STRING_SESSION), API_ID, API_HASH)
              await client.connect()
              
              if not await client.is_user_authorized():
                  print("Sesi tidak valid! Periksa STRING_SESSION.")
                  return

              print(f"Berhasil login! Mencari chat: {TARGET_CHAT}")

              try:
                  entity = await client.get_entity(TARGET_CHAT)
                  
                  # 1. Start/Get Group Call
                  try:
                      await client(functions.phone.CreateGroupCallRequest(
                          peer=entity, title="NOBAR FILM", rtmp_stream=True
                      ))
                      print("Group Call baru dibuat.")
                  except Exception:
                      print("Group Call sudah ada, lanjut mengambil RTMP...")

                  # 2. Ambil detail RTMP
                  call_info = await client(functions.phone.GetGroupCallStreamRtmpUrlRequest(
                      peer=entity, revoke=False
                  ))
                  
                  full_rtmp = f"{call_info.url}{call_info.key}"
                  print(f"Streaming dimulai ke RTMP URL...")

                  # 3. Filter & Optimasi FFmpeg
                  # Ditambahkan reconnect flags agar tidak mudah putus jika server video lambat
                  ffmpeg_cmd = [
                      "ffmpeg", 
                      "-reconnect", "1", "-reconnect_streamed", "1", "-reconnect_delay_max", "5",
                      "-re", "-i", VIDEO_URL,
                      "-vf", "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:-1:-1:color=black,drawtext=text='TipiStream':fontcolor=white:fontsize=20:x=20:y=20",
                      "-c:v", "libx264", "-preset", "veryfast", "-b:v", "2500k", "-maxrate", "2500k", "-bufsize", "5000k",
                      "-pix_fmt", "yuv420p", "-g", "50",
                      "-c:a", "aac", "-b:a", "128k", "-ar", "44100",
                      "-f", "flv", full_rtmp
                  ]

                  process = subprocess.Popen(ffmpeg_cmd, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, universal_newlines=True)
                  
                  # Menampilkan log FFmpeg secara real-time agar workflow tidak dianggap 'stuck'
                  for line in process.stdout:
                      print(line, end='')

                  process.wait()
                  print("Film selesai atau FFmpeg berhenti.")

              except Exception as e:
                  print(f"Terjadi kesalahan: {e}")
              finally:
                  await client.disconnect()

          if __name__ == '__main__':
              asyncio.run(main())
          EOF
          python3 streamer.py
