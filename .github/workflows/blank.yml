name: Auto FFmpeg Stream (No PyTgCalls)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link Video'
        required: true
        default: 'https://tipigd.tipikug.workers.dev/0:/Me/Pencarian.Terakhir.2025.1080p.NF.WEB-DL.DDP5.1.H.264-KQRM.mkv'

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Install FFmpeg & Telethon
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install telethon

      - name: Get RTMP and Stream
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
        run: |
          cat << 'EOF' > run_stream.py
          import asyncio
          import os
          import subprocess
          from telethon import TelegramClient, functions
          from telethon.sessions import StringSession

          # Data Akun Kamu
          API_ID = 961780
          API_HASH = "bbbfa43f067e1e8e2fb41f334d32a6a7"
          SESSION = "1BVtsOHABu4d7oTmHXsUhb7ovCiAjbbhuuCIWAioaJFunUqq-SRBjREVwC5JgHOJvclvnvGbqfW3SNj2TOKY2WdzQKurUcHEJictLnN9aIWvlSXLJmXSdQichst3Pm-lKCN8UuDlp2L8Xf2tp0vXHoaU_nMuWdeFZNrY5EUkH35lTE_IsVgFvngG7GqNGdNHzvbxFJswRYl8HwpMvi8AS9umrMgMU0gtyqpb-qjqxm_oGozLiam4HIAmWKcOGAlnd9UGpMvABNE4fEATsoYXMbkpcHt0fFX67sCf7xOpXGaAne7zigOtWfMRUTnTsjeLNi_D3vZ8BQO54lskdHfdBQSyFLZoVjOQ="
          CHAT_ID = -1003759439331
          VIDEO_URL = os.environ.get("VIDEO_URL")

          async def main():
              client = TelegramClient(StringSession(SESSION), API_ID, API_HASH)
              await client.start()
              print("Login Berhasil!")

              try:
                  # 1. Ambil info RTMP dari Group Call (Mulai jika belum ada)
                  result = await client(functions.phone.GetGroupCallStreamRtmpUrlRequest(
                      peer=CHAT_ID,
                      revoke=False
                  ))
                  rtmp_url = result.url
                  rtmp_key = result.key
                  full_rtmp = f"{rtmp_url}{rtmp_key}"
                  print(f"Berhasil mendapatkan RTMP!")

                  # 2. Siapkan Filter FFmpeg (1080p Full Landscape + Watermark)
                  v_filter = "scale=1920:1080:force_original_aspect_ratio=decrease,pad=1920:1080:-1:-1:color=black,drawtext=text='TipiStream':fontcolor=white:fontsize=24:x=30:y=30"

                  # 3. Jalankan FFmpeg langsung dari Python
                  ffmpeg_cmd = [
                      "ffmpeg", "-re", "-i", VIDEO_URL,
                      "-vf", v_filter,
                      "-c:v", "libx264", "-preset", "veryfast", "-b:v", "2500k", "-pix_fmt", "yuv420p",
                      "-c:a", "aac", "-b:a", "128k", "-ac", "2",
                      "-f", "flv", full_rtmp
                  ]
                  
                  print("Memulai streaming FFmpeg...")
                  process = subprocess.Popen(ffmpeg_cmd)
                  process.wait()

              except Exception as e:
                  print(f"Error: {e}")
              finally:
                  await client.disconnect()

          if __name__ == "__main__":
              asyncio.run(main())
          EOF
          python3 run_stream.py
