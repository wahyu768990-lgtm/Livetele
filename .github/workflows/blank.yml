name: Auto Stream Userbot (Telethon)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link Video (mp4/mkv/m3u8)'
        required: true
        default: 'https://tipigd.tipikug.workers.dev/0:/Me/Pencarian.Terakhir.2025.1080p.NF.WEB-DL.DDP5.1.H.264-KQRM.mkv'

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install telethon pytgcalls

      - name: Create Python Streaming Script
        run: |
          cat << 'EOF' > stream.py
          import asyncio
          from telethon import TelegramClient
          from telethon.sessions import StringSession
          from pytgcalls import PyTgCalls
          from pytgcalls.types import MediaStream
          import os

          # Konfigurasi Default (Hardcoded)
          API_ID = 961780
          API_HASH = "bbbfa43f067e1e8e2fb41f334d32a6a7"
          SESSION = "1BVtsOHABu4d7oTmHXsUhb7ovCiAjbbhuuCIWAioaJFunUqq-SRBjREVwC5JgHOJvclvnvGbqfW3SNj2TOKY2WdzQKurUcHEJictLnN9aIWvlSXLJmXSdQichst3Pm-lKCN8UuDlp2L8Xf2tp0vXHoaU_nMuWdeFZNrY5EUkH35lTE_IsVgFvngG7GqNGdNHzvbxFJswRYl8HwpMvi8AS9umrMgMU0gtyqpb-qjqxm_oGozLiam4HIAmWKcOGAlnd9UGpMvABNE4fEATsoYXMbkpcHt0fFX67sCf7xOpXGaAne7zigOtWfMRUTnTsjeLNi_D3vZ8BQO54lskdHfdBQSyFLZoVjOQ="
          CHAT_ID = -1003759439331  # ID grup dari RTMP kamu
          VIDEO_URL = os.environ.get("VIDEO_URL")

          app = TelegramClient(StringSession(SESSION), API_ID, API_HASH)
          call = PyTgCalls(app)

          async def main():
              await app.start()
              await call.start()
              print("Userbot Aktif & Login Berhasil!")
              
              # Filter FFmpeg untuk 1080p Landscape & Watermark
              V_FILTER = "scale=1920:1080:force_original_aspect_ratio=decrease,pad=1920:1080:-1:-1:color=black,drawtext=text='TipiStream':fontcolor=white:fontsize=24:x=30:y=30"
              
              try:
                  await call.join_group_call(
                      CHAT_ID,
                      MediaStream(
                          VIDEO_URL,
                          video_flags=MediaStream.Flags.VIDEO,
                          ffmpeg_parameters=f'-vf "{V_FILTER}" -b:v 2500k -pix_fmt yuv420p'
                      )
                  )
                  print(f"Sedang memutar: {VIDEO_URL}")
                  # Menahan agar workflow tidak mati
                  while True:
                      await asyncio.sleep(10)
              except Exception as e:
                  print(f"Error saat streaming: {e}")

          if __name__ == "__main__":
              app.loop.run_until_complete(main())
          EOF

      - name: Run Streaming
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
        run: python stream.py
