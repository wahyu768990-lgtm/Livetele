name: Stream URL to Telegram RTMP (Default Set)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link Video (mp4/mkv/m3u8)'
        required: true
      subtitle_url:
        description: 'Link Subtitle (.srt / .ass) - Opsional'
        required: false

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Install FFmpeg & Curl
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl fonts-dejavu

      - name: Start Streaming
        env:
          DEFAULT_RTMP: "rtmps://dc5-1.rtmp.t.me/s/3759439331:ewdfbhxlMviYmNtJPZtbZg"
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          SUB_URL: ${{ github.event.inputs.subtitle_url }}
        run: |
          # 1. Dasar filter: Paksa scale ke 1080p (16:9) agar Telegram tidak bingung
          V_FILTER="scale=1920:1080:force_original_aspect_ratio=decrease,pad=1920:1080:-1:-1:color=black"

          # 2. Tambahkan subtitle jika ada input URL-nya
          if [ -n "$SUB_URL" ]; then
            echo "Downloading subtitle..."
            curl -L "$SUB_URL" -o "mysub.srt"
            V_FILTER="$V_FILTER,subtitles=mysub.srt"
          fi

          # 3. Tambahkan Watermark TipiStream di pojok kiri atas
          V_FILTER="$V_FILTER,drawtext=text='TipiStream':fontcolor=white:fontsize=24:x=30:y=30"

          # Menentukan target URL RTMP
          TARGET_URL="${{ secrets.RTMP_URL }}"
          if [ -z "$TARGET_URL" ]; then
            TARGET_URL="$DEFAULT_RTMP"
          fi

          # Eksekusi FFmpeg
          ffmpeg -re -i "$VIDEO_URL" \
          -vf "$V_FILTER" \
          -c:v libx264 -preset veryfast -b:v 2500k -pix_fmt yuv420p \
          -c:a aac -b:a 128k -ac 2 \
          -f flv "$TARGET_URL"
