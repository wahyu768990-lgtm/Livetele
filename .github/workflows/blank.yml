name: Auto Nobar Stream (Telethon + FFmpeg)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link Video'
        required: true
        default: 'https://tipigd.tipikug.workers.dev/0:/Me/Pencarian.Terakhir.2025.1080p.NF.WEB-DL.DDP5.1.H.264-KQRM.mkv'

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Install FFmpeg & Telethon
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install telethon

      - name: Run Auto Streamer
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
        run: |
          cat << 'EOF' > streamer.py
          import asyncio
          import os
          import subprocess
          from telethon import TelegramClient, functions, types
          from telethon.sessions import StringSession

          # --- DATA DARI USER ---
          API_ID = 961780
          API_HASH = 'bbbfa43f067e1e8e2fb41f334d32a6a7'
          STRING_SESSION = '1BVtsOHABu4d7oTmHXsUhb7ovCiAjbbhuuCIWAioaJFunUqq-SRBjREVwC5JgHOJvclvnvGbqfW3SNj2TOKY2WdzQKurUcHEJictLnN9aIWvlSXLJmXSdQichst3Pm-lKCN8UuDlp2L8Xf2tp0vXHoaU_nMuWdeFZNrY5EUkH35lTE_IsVgFvngG7GqNGdNHzvbxFJswRYl8HwpMvi8AS9umrMgMU0gtyqpb-qjqxm_oGozLiam4HIAmWKcOGAlnd9UGpMvABNE4fEATsoYXMbkpcHt0fFX67sCf7xOpXGaAne7zigOtWfMRUTnTsjeLNi_D3vZ8BQO54lskdHfdBQSyFLZoVjOQ='
          TARGET_CHAT = '@whwhwwiw' 
          VIDEO_URL = os.environ.get("VIDEO_URL")

          async def main():
              client = TelegramClient(StringSession(STRING_SESSION), API_ID, API_HASH)
              await client.connect()
              
              if not await client.is_user_authorized():
                  print("Sesi tidak valid!")
                  return

              print(f"Berhasil login! Menyiapkan stream di {TARGET_CHAT}...")

              try:
                  entity = await client.get_entity(TARGET_CHAT)
                  
                  # 1. Pastikan Group Call aktif (RTMP Mode)
                  try:
                      await client(functions.phone.CreateGroupCallRequest(
                          peer=entity,
                          title="NOBAR",
                          rtmp_stream=True
                      ))
                      print("Group Call baru dibuat.")
                  except Exception:
                      print("Group Call sudah ada, mengambil info RTMP...")

                  # 2. Ambil detail RTMP
                  call_info = await client(functions.phone.GetGroupCallStreamRtmpUrlRequest(
                      peer=entity,
                      revoke=False
                  ))
                  
                  full_rtmp = f"{call_info.url}{call_info.key}"
                  print(f"RTMP didapat! Memulai FFmpeg...")

                  # 3. Filter FFmpeg (1080p Landscape + Watermark)
                  v_filter = (
                      "scale=1920:1080:force_original_aspect_ratio=decrease,"
                      "pad=1920:1080:-1:-1:color=black,"
                      "drawtext=text='TipiStream':fontcolor=white:fontsize=24:x=30:y=30"
                  )

                  ffmpeg_cmd = [
                      "ffmpeg", "-re", "-i", VIDEO_URL,
                      "-vf", v_filter,
                      "-c:v", "libx264", "-preset", "veryfast", "-b:v", "3000k", "-pix_fmt", "yuv420p",
                      "-c:a", "aac", "-b:a", "128k", "-ac", "2",
                      "-f", "flv", full_rtmp
                  ]

                  # Jalankan streaming
                  process = subprocess.Popen(ffmpeg_cmd)
                  process.wait()

              except Exception as e:
                  print(f"Terjadi kesalahan: {e}")
              finally:
                  await client.disconnect()

          if __name__ == '__main__':
              asyncio.run(main())
          EOF
          python3 streamer.py
