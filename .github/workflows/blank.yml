name: Auto Stream Userbot (Telethon)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link Video (mp4/mkv/m3u8)'
        required: true
      chat_id:
        description: 'ID Grup Telegram (Gunakan awalan -100... contoh: -100123456789)'
        required: true

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install telethon pytgcalls

      - name: Create Python Streaming Script
        run: |
          cat << 'EOF' > stream.py
          import os
          import asyncio
          from telethon import TelegramClient
          from telethon.sessions import StringSession
          from pytgcalls import PyTgCalls
          from pytgcalls.types import MediaStream

          # Mengambil data dari environment (Github Secrets)
          SESSION = os.environ.get("STRING_SESSION")
          API_ID = int(os.environ.get("API_ID"))
          API_HASH = os.environ.get("API_HASH")
          VIDEO_URL = os.environ.get("VIDEO_URL")
          CHAT_ID = int(os.environ.get("CHAT_ID"))

          # Inisialisasi Telethon dan PyTgCalls
          app = TelegramClient(StringSession(SESSION), API_ID, API_HASH)
          call = PyTgCalls(app)

          async def main():
              await app.start()
              await call.start()
              print("Userbot berhasil login! Mencoba bergabung ke Obrolan Video...")
              
              try:
                  # Bergabung ke obrolan video di grup dan memutar video
                  await call.join_group_call(
                      CHAT_ID,
                      MediaStream(
                          VIDEO_URL,
                          video_flags=MediaStream.Flags.VIDEO
                      )
                  )
                  print("Streaming sedang berjalan! Workflow akan terus menyala...")
                  # Menahan script agar tidak tertutup otomatis
                  await asyncio.Event().wait()
              except Exception as e:
                  print(f"Terjadi error: {e}")

          # Menjalankan script
          app.loop.run_until_complete(main())
          EOF

      - name: Start Bot Streaming
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          STRING_SESSION: ${{ secrets.STRING_SESSION }}
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
        run: python stream.py
          fi

          # 3. Tambahkan Watermark TipiStream di pojok kiri atas
          V_FILTER="$V_FILTER,drawtext=text='TipiStream':fontcolor=white:fontsize=24:x=30:y=30"

          # Menentukan target URL RTMP
          TARGET_URL="${{ secrets.RTMP_URL }}"
          if [ -z "$TARGET_URL" ]; then
            TARGET_URL="$DEFAULT_RTMP"
          fi

          # Eksekusi FFmpeg
          ffmpeg -re -i "$VIDEO_URL" \
          -vf "$V_FILTER" \
          -c:v libx264 -preset veryfast -b:v 2500k -pix_fmt yuv420p \
          -c:a aac -b:a 128k -ac 2 \
          -f flv "$TARGET_URL"
