name: Nobar Stream Ultimate 

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link / Google Drive / M3U8'
        required: true
        default: 'https://drive.google.com/uc?id=1ddFW6aV5dJxhV2wdfmEFf4K48d4G9MFA&export=download'
      quality:
        description: 'Kualitas Video'
        required: true
        type: choice
        options: [ '1080p', 'auto' ]
        default: 'auto'
      use_subtitle:
        description: 'Gunakan Subtitle Indonesia?'
        required: true
        type: choice
        options: [ 'true', 'false' ]
        default: 'true'
      subtitle_track:
        description: 'Track subtitle relatif (auto / 0 / 1 / 2 ...)'
        required: true
        default: 'auto'
      custom_rtmp:
        description: 'Custom RTMP (Kosongkan jika ke Telegram)'
        required: false
        default: ''

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg aria2
          pip install telethon requests langdetect

      - name: Smart Download, Subtitle Extract & Stream
        env:
          # --- DATA DEFAULT KAMU ---
          API_ID: 27095962
          API_HASH: '2a6a2a3d4bb616f254325bdc5007496d'
          STRING_SESSION: '1BVtsOHABu8YLZZ-e0n0HBjd7CZHOtCIreRto5IulVtonWOjACzFNaw2VtcsLyIwserSdDdldwIIxJ0rfKciVSWiWSsEwgvSKJZ4T5Dven4qjp_9n5IwITQjy4nERcjlpzDEO8F6UUuJchb3_L3Gjrck8r0G74GaZVMgP-Ufwf86wklONhtp96-N0sQSKlAVZVn2mdDFd81vjPyfiO5mATUnWJza2jFW-dlbWwXFaQ4HQ2z7y36QWMIfGjfZdk4Svhtv4DqhALDzQ_niujQRvHNRhAWroxeNhyZMPAG2klPfSMeRjsl8wfx3I0k2oVcLFasAZFIy8FFwKZvb6vxC-l01L4spV54c='
          TARGET_CHAT: 'aiahwhsushe'
          # -------------------------
          CUSTOM_RTMP: ${{ github.event.inputs.custom_rtmp }}
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          QUALITY: ${{ github.event.inputs.quality }}
          USE_SUBTITLE: ${{ github.event.inputs.use_subtitle }}
          SUBTITLE_TRACK: ${{ github.event.inputs.subtitle_track }}
        run: |
          cat << 'EOF' > streamer.py
          import asyncio
          import os
          import subprocess
          import re
          import json
          import requests
          from pathlib import Path
          from urllib.parse import urlparse, unquote
          from telethon import TelegramClient, functions
          from telethon.sessions import StringSession
          from langdetect import detect, DetectorFactory
          
          DetectorFactory.seed = 0

          API_ID = int(os.environ.get("API_ID"))
          API_HASH = os.environ.get("API_HASH")
          STRING_SESSION = os.environ.get("STRING_SESSION")
          TARGET_CHAT = os.environ.get("TARGET_CHAT")
          CUSTOM_RTMP = os.environ.get("CUSTOM_RTMP", "").strip()
          VIDEO_URL = os.environ.get("VIDEO_URL", "").strip()
          QUALITY = os.environ.get("QUALITY", "auto").strip()
          USE_SUBTITLE = os.environ.get("USE_SUBTITLE", "false").lower() == "true"
          SUBTITLE_TRACK = os.environ.get("SUBTITLE_TRACK", "auto").strip().lower()

          FONTS_DIR = "fonts_extracted"
          VIDEO_FILENAME = "film_lokal.mp4"
          TEXT_SUB_CODECS = {"subrip", "srt", "ass", "ssa", "webvtt", "mov_text", "text"}

          def sanitize(name):
              return re.sub(r'[\\/:*?"<>|]+', ' ', name).strip()

          def ffmpeg_escape_filter_path(path: str) -> str:
              return path.replace("\\", "\\\\").replace(":", r"\:").replace("'", r"\'").replace("[", r"\[").replace("]", r"\]").replace(",", r"\,")

          def clean_sub_text(text: str) -> str:
              text = re.sub(r'\d+\s*\n', '\n', text)
              text = re.sub(r'\d{2}:\d{2}:\d{2}[,.]\d{1,3}\s*-->\s*\d{2}:\d{2}:\d{2}[,.]\d{1,3}', ' ', text)
              text = re.sub(r'\{[^}]*\}', ' ', text)
              text = re.sub(r'<[^>]+>', ' ', text)
              text = re.sub(r'^[\-–—]\s*', '', text, flags=re.MULTILINE)
              text = re.sub(r'[^\w\s]', ' ', text.lower())
              text = re.sub(r'\s+', ' ', text).strip()
              return text

          def score_indonesian_text(text: str) -> int:
              if not text: return 0
              cleaned = clean_sub_text(text)
              if len(cleaned.split()) < 10: return 0
              try:
                  lang = detect(cleaned)
                  if lang == 'id': return 100
                  elif lang == 'ms': return -50
              except: pass
              return 0

          def get_filename_and_url(url):
              final_url, filename, cookies = url, "video_stream", {}
              drive_match = re.search(r'(?:id=|\/d\/)([a-zA-Z0-9_-]{25,})', url)
              if drive_match:
                  file_id = drive_match.group(1)
                  session = requests.Session()
                  res = session.get("https://drive.google.com/uc?export=download", params={'id': file_id})
                  token = next((v for k, v in session.cookies.get_dict().items() if k.startswith("download_warning")), "")
                  if not token:
                      m = re.search(r'name="confirm" value="([^"]+)"', res.text)
                      token = m.group(1) if m else "t"
                  final_url = f"https://drive.usercontent.google.com/download?id={file_id}&export=download&confirm={token}"
                  cookies = session.cookies.get_dict()
              try:
                  with requests.get(final_url, cookies=cookies, stream=True, allow_redirects=True, timeout=10) as r:
                      cd = r.headers.get('content-disposition')
                      if cd:
                          fname = re.findall('filename="(.+?)"', cd)
                          if fname: filename = unquote(fname[0])
                      else:
                          filename = Path(unquote(urlparse(r.url).path)).name or "video_stream"
              except: pass
              filename = sanitize(filename)
              if not Path(filename).suffix: filename += ".mp4"
              return filename, final_url, cookies

          custom_headers = ""
          if "|" in VIDEO_URL:
              parts = VIDEO_URL.split("|", 1)
              VIDEO_URL = parts[0]
              h_list = []
              for kv in parts[1].split("&"):
                  if "=" in kv:
                      k, v = kv.split("=", 1)
                      h_list.append(f"{k}: {v}")
              if h_list:
                  custom_headers = "\r\n".join(h_list) + "\r\n"

          if ".m3u8" in VIDEO_URL.lower() or ".m3u" in VIDEO_URL.lower():
              VIDEO_INPUT, IS_LOCAL = VIDEO_URL, False
          else:
              VIDEO_FILENAME, DL_URL, COOKIES = get_filename_and_url(VIDEO_URL)
              VIDEO_INPUT, IS_LOCAL = VIDEO_FILENAME, True
              c_str = "; ".join([f"{k}={v}" for k, v in COOKIES.items()])
              cmd = ["aria2c", "-c", "-x", "16", "-s", "16", "-j", "5", "-o", VIDEO_FILENAME, DL_URL]
              if c_str: cmd.insert(1, f"--header=Cookie: {c_str}")
              subprocess.run(cmd, check=True)

          def extract_subtitle_sample(rel_idx: int, seconds: int = 180) -> str:
              tmp_path = f"/tmp/subsample_{rel_idx}.srt"
              try:
                  cmd = ["ffmpeg", "-y", "-loglevel", "error", "-ss", "300", "-i", VIDEO_INPUT, "-map", f"0:s:{rel_idx}", "-c:s", "srt", "-t", str(seconds), tmp_path]
                  subprocess.run(cmd, check=True, timeout=40)
                  with open(tmp_path, "r", encoding="utf-8", errors="ignore") as f: return f.read(15000)
              except: return ""
              finally:
                  if os.path.exists(tmp_path): os.remove(tmp_path)

          def detect_best_indonesian_subtitle(sub_streams):
              best_idx, best_score, best_reason = -1, -999, "Tidak ditemukan"
              fansub_keywords = ["wibusubs", "kusonime", "oploverz", "anoboy", "sentaisubs", "moesubs", "melong", "otakudesu", "samehadaku"]
              for i, s in enumerate(sub_streams):
                  tags = s.get("tags", {}) or {}
                  lang, title, codec = (tags.get("language") or "").lower(), (tags.get("title") or "").lower(), (s.get("codec_name") or "").lower()
                  score, reason_parts = 0, []
                  if s.get("disposition", {}).get("default") == 1: score += 3; reason_parts.append("default")
                  if lang in ["ind", "id", "indonesian"]: score += 12; reason_parts.append("tag-lang")
                  if any(x in title for x in ["indo", "bahasa"]): score += 10; reason_parts.append("title-indo")
                  if any(k in title for k in fansub_keywords): score += 6; reason_parts.append("fansub")
                  if codec in TEXT_SUB_CODECS and IS_LOCAL:
                      c_score = score_indonesian_text(extract_subtitle_sample(i))
                      if c_score > 0: score += c_score; reason_parts.append(f"AI-ID:{c_score}")
                  if score > best_score: best_score, best_idx, best_reason = score, i, ", ".join(reason_parts)
              return (best_idx, best_reason, best_score) if best_score >= 6 else (-1, "Cek Manual", best_score)

          def get_stream_data():
              cmd = ["ffprobe", "-v", "quiet", "-print_format", "json", "-show_format", "-show_streams"]
              if custom_headers:
                  cmd.extend(["-headers", custom_headers])
              cmd.append(VIDEO_INPUT)
              data = json.loads(subprocess.run(cmd, capture_output=True, text=True).stdout or "{}")
              info = {"sub_rel_idx": -1, "sub_codec": "", "sub_reason": "Nonaktif", "has_fonts": False, "res": "N/A", "dur": "N/A", "src_q": "N/A"}
              streams = data.get("streams", [])
              v_s = [s for s in streams if s.get("codec_type") == "video"]
              if v_s:
                  v = sorted(v_s, key=lambda x: x.get("height", 0), reverse=True)[0]
                  info.update({"res": f"{v.get('width')}x{v.get('height')}", "src_q": f"{v.get('height')}p"})
              d_raw = data.get("format", {}).get("duration")
              if d_raw:
                  sec = int(float(d_raw))
                  info["dur"] = f"{sec//3600:02d}:{(sec%3600)//60:02d}:{sec%60:02d}"
              if any(s.get("codec_type") == "attachment" for s in streams): info["has_fonts"] = True
              sub_s = [s for s in streams if s.get("codec_type") == "subtitle"]
              if USE_SUBTITLE and sub_s:
                  idx, reason, _ = detect_best_indonesian_subtitle(sub_s)
                  if idx != -1: info.update({"sub_rel_idx": idx, "sub_codec": sub_s[idx].get("codec_name", ""), "sub_reason": reason})
              return info

          async def main():
              info = get_stream_data()
              font_path = None
              if info["has_fonts"] and IS_LOCAL:
                  os.makedirs(FONTS_DIR, exist_ok=True)
                  subprocess.run(["ffmpeg", "-dump_attachment:t", "", "-i", os.path.abspath(VIDEO_INPUT)], cwd=FONTS_DIR, stderr=subprocess.DEVNULL)
                  font_path = os.path.abspath(FONTS_DIR)
              client = TelegramClient(StringSession(STRING_SESSION), API_ID, API_HASH)
              await client.connect()
              rtmp = CUSTOM_RTMP
              if not rtmp:
                  ent = await client.get_entity(TARGET_CHAT)
                  try: await client(functions.phone.CreateGroupCallRequest(peer=ent, title=VIDEO_FILENAME[:120], rtmp_stream=True))
                  except: pass
                  call = await client(functions.phone.GetGroupCallStreamRtmpUrlRequest(peer=ent, revoke=False))
                  rtmp = f"{call.url}{call.key}"
              sub_status = f"✅ Indonesia (Track {info['sub_rel_idx']}) - {info['sub_reason']}" if info['sub_rel_idx'] != -1 else "❌ Nonaktif"
              msg = f"🎬 **STREAMING DIMULAI**\n\n🏷 **Judul:** `{VIDEO_FILENAME}`\n🎥 **Res:** `{info['res']}` ({info['src_q']})\n⏱ **Durasi:** `{info['dur']}`\n💬 **Sub:** `{sub_status}`\n⚙️ **Output:** `{QUALITY}`"
              await client.send_message(TARGET_CHAT, msg)
              await client.disconnect()
              last_ts = "00:00:00"
              while True:
                  cmd = ["ffmpeg", "-y"]
                  if IS_LOCAL: cmd.extend(["-re"])

                  if not IS_LOCAL:
                      cmd.extend(["-reconnect", "1", "-reconnect_at_eof", "1", "-reconnect_streamed", "1", "-reconnect_delay_max", "5"])
                  if custom_headers:
                      cmd.extend(["-headers", custom_headers])

                  if IS_LOCAL and last_ts != "00:00:00": cmd.extend(["-ss", last_ts])
                  cmd.extend(["-i", VIDEO_INPUT])
                  f_complex, v_map = [], "0:v:0"
                  has_sub = info["sub_rel_idx"] != -1 and IS_LOCAL
                  if QUALITY == "1080p":
                      f_complex.append("[0:v]scale=1920:-2[v_scaled]")
                      v_map = "[v_scaled]"
                  if has_sub:
                      if info["sub_codec"] in TEXT_SUB_CODECS:
                          sc = f"subtitles=filename='{ffmpeg_escape_filter_path(os.path.abspath(VIDEO_INPUT))}':si={info['sub_rel_idx']}"
                          if font_path: sc += f":fontsdir='{ffmpeg_escape_filter_path(font_path)}'"
                          f_complex.append(f"{v_map}{sc}[v_final]"); v_map = "[v_final]"
                      else: f_complex.append(f"{v_map}[0:s:{info['sub_rel_idx']}]overlay[v_final]"); v_map = "[v_final]"
                  if f_complex: cmd.extend(["-filter_complex", ";".join(f_complex)])
                  
                  # MODIFIKASI DISINI: Menambahkan -ac 2 dan memastikan -f flv
                  cmd.extend([
                      "-map", v_map, "-map", "0:a:0?", 
                      "-c:v", "libx264", "-preset", "veryfast", "-profile:v", "main", 
                      "-b:v", "4000k", "-maxrate", "4000k", "-bufsize", "8000k", 
                      "-pix_fmt", "yuv420p", "-sc_threshold", "0", "-g", "60", "-keyint_min", "60", 
                      "-c:a", "aac", "-b:a", "128k", "-ar", "44100", "-ac", "2", 
                      "-f", "flv", "-flvflags", "no_duration_filesize"
                  ])
                  
                  if rtmp.startswith("rtmps://"):
                      cmd.extend(["-tls_verify", "0"])
                  cmd.append(rtmp)
                  proc = subprocess.Popen(cmd, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, universal_newlines=True)
                  for line in proc.stdout:
                      t = re.search(r"time=(\d{2}:\d{2}:\d{2})", line)
                      if t: last_ts = t.group(1)
                  if proc.wait() == 0: break
                  await asyncio.sleep(5)

          if __name__ == '__main__': asyncio.run(main())
          EOF
          python3 streamer.py
