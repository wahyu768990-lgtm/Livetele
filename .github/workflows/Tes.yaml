name: Nobar Stream Pro (Auto Filename & Font Support)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link / Google Drive / M3U8'
        required: true
        default: 'https://drive.google.com/uc?id=1ddFW6aV5dJxhV2wdfmEFf4K48d4G9MFA&export=download'
      quality:
        description: 'Kualitas Video'
        required: true
        type: choice
        options: [ '1080p', 'auto' ]
        default: 'auto'
      use_subtitle:
        description: 'Gunakan Subtitle Indonesia?'
        required: true
        type: choice
        options: [ 'true', 'false' ]
        default: 'true'
      custom_rtmp:
        description: 'Custom RTMP (Kosongkan jika ke Telegram)'
        required: false
        default: ''

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg aria2
          pip install telethon requests

      - name: Smart Download, Font Extract & Stream
        env:
          API_ID: 27095962
          API_HASH: '2a6a2a3d4bb616f254325bdc5007496d'
          STRING_SESSION: '1BVtsOHABu8YLZZ-e0n0HBjd7CZHOtCIreRto5IulVtonWOjACzFNaw2VtcsLyIwserSdDdldwIIxJ0rfKciVSWiWSsEwgvSKJZ4T5Dven4qjp_9n5IwITQjy4nERcjlpzDEO8F6UUuJchb3_L3Gjrck8r0G74GaZVMgP-Ufwf86wklONhtp96-N0sQSKlAVZVn2mdDFd81vjPyfiO5mATUnWJza2jFW-dlbWwXFaQ4HQ2z7y36QWMIfGjfZdk4Svhtv4DqhALDzQ_niujQRvHNRhAWroxeNhyZMPAG2klPfSMeRjsl8wfx3I0k2oVcLFasAZFIy8FFwKZvb6vxC-l01L4spV54c='
          TARGET_CHAT: 'aiahwhsushe'
          CUSTOM_RTMP: ${{ github.event.inputs.custom_rtmp }}
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          QUALITY: ${{ github.event.inputs.quality }}
          USE_SUBTITLE: ${{ github.event.inputs.use_subtitle }}
        run: |
          cat << 'EOF' > streamer.py
          import asyncio
          import os
          import subprocess
          import re
          import json
          import requests
          from pathlib import Path
          from urllib.parse import urlparse, unquote
          from telethon import TelegramClient, functions
          from telethon.sessions import StringSession

          API_ID = int(os.environ.get("API_ID"))
          API_HASH = os.environ.get("API_HASH")
          STRING_SESSION = os.environ.get("STRING_SESSION")
          TARGET_CHAT = os.environ.get("TARGET_CHAT")
          CUSTOM_RTMP = os.environ.get("CUSTOM_RTMP", "").strip()
          VIDEO_URL = os.environ.get("VIDEO_URL", "").strip()
          QUALITY = os.environ.get("QUALITY", "auto").strip()
          USE_SUBTITLE = os.environ.get("USE_SUBTITLE", "false").lower() == "true"

          FONTS_DIR = "fonts_extracted"
          VIDEO_FILENAME = "film_lokal.mp4" # Default

          def sanitize_filename(name):
              return re.sub(r'[\\/:*?"<>|]+', ' ', name).strip()

          def get_drive_direct_url(video_url):
              session = requests.Session()
              drive_match = re.search(r'(?:id=|\/d\/)([a-zA-Z0-9_-]{25,})', video_url)
              if drive_match:
                  file_id = drive_match.group(1)
                  base_url = "https://drive.google.com/uc?export=download"
                  res = session.get(base_url, params={'id': file_id}, allow_redirects=True)
                  confirm_token = next((v for k, v in session.cookies.get_dict().items() if k.startswith("download_warning")), "")
                  if not confirm_token:
                      match = re.search(r'name="confirm" value="([^"]+)"', res.text)
                      confirm_token = match.group(1) if match else "t"
                  return (f"https://drive.usercontent.google.com/download?id={file_id}&export=download&confirm={confirm_token}", session.cookies.get_dict())
              return video_url, {}

          def get_filename_and_url(url):
              final_url = url
              filename = "video_stream"
              cookies = {}

              if "drive.google.com" in url or "drive.usercontent.google.com" in url:
                  final_url, cookies = get_drive_direct_url(url)
              
              try:
                  with requests.get(final_url, cookies=cookies, stream=True, allow_redirects=True, timeout=10) as r:
                      # Deteksi Content-Disposition
                      cd = r.headers.get('content-disposition')
                      if cd:
                          fname = re.findall('filename="(.+?)"', cd)
                          if not fname: fname = re.findall("filename\*=UTF-8''(.+)", cd)
                          if fname: filename = unquote(fname[0])
                      else:
                          # Fallback ke URL path
                          filename = Path(unquote(urlparse(r.url).path)).name or "video_stream"
              except Exception as e:
                  print(f"⚠️ Gagal deteksi filename: {e}")
              
              filename = sanitize_filename(filename)
              # Pastikan punya ekstensi
              if not Path(filename).suffix:
                  filename += ".mp4"
              
              return filename, final_url, cookies

          # 1. Download Setup
          if ".m3u8" in VIDEO_URL.lower():
              VIDEO_INPUT = VIDEO_URL
              IS_LOCAL_FILE = False
              print(f"🔍 Streaming dari Link M3U8")
          else:
              VIDEO_FILENAME, DL_URL, COOKIES = get_filename_and_url(VIDEO_URL)
              VIDEO_INPUT = VIDEO_FILENAME
              IS_LOCAL_FILE = True
              
              print(f"🚀 Detected Filename: {VIDEO_FILENAME}")
              cookie_str = "; ".join([f"{k}={v}" for k, v in COOKIES.items()])
              
              cmd = ["aria2c", "-c", "-x", "16", "-s", "16", "-j", "5", "--auto-file-renaming=false", "-o", VIDEO_FILENAME, DL_URL]
              if cookie_str: cmd.insert(1, f"--header=Cookie: {cookie_str}")
              subprocess.run(cmd, check=True)

          # 2. Font Extraction (Ham's Trick)
          def extract_fonts(input_file):
              if not input_file.lower().endswith(".mkv"): return None
              os.makedirs(FONTS_DIR, exist_ok=True)
              print("🎨 MKV Detected. Extracting fonts...")
              subprocess.run(["ffmpeg", "-dump_attachment:t", "", "-i", f"../{input_file}"], cwd=FONTS_DIR, stderr=subprocess.DEVNULL)
              return os.path.abspath(FONTS_DIR)

          def get_metadata():
              cmd = ["ffprobe", "-v", "quiet", "-print_format", "json", "-show_format", "-show_streams", VIDEO_INPUT]
              res = subprocess.run(cmd, capture_output=True, text=True)
              data = json.loads(res.stdout)
              meta = {"title": VIDEO_FILENAME, "sub_idx": -1, "has_fonts": False}
              
              if USE_SUBTITLE:
                  subs = [s for s in data.get("streams", []) if s.get("codec_type") == "subtitle"]
                  for i, s in enumerate(subs):
                      tags = s.get("tags", {})
                      lang, title = tags.get("language", "").lower(), tags.get("title", "").lower()
                      if any(x in lang for x in ["ind", "id"]) or any(x in title for x in ["indo", "indonesia"]):
                          meta["sub_idx"] = i # index relatif filter subtitle
                          break
              
              if any(s.get("codec_type") == "attachment" for s in data.get("streams", [])):
                  meta["has_fonts"] = True
              return meta

          async def main():
              meta = get_metadata()
              font_path = extract_fonts(VIDEO_INPUT) if meta["has_fonts"] else None
              
              client = TelegramClient(StringSession(STRING_SESSION), API_ID, API_HASH)
              await client.connect()
              
              full_rtmp = CUSTOM_RTMP
              if not full_rtmp:
                  entity = await client.get_entity(TARGET_CHAT)
                  try: await client(functions.phone.CreateGroupCallRequest(peer=entity, title=meta["title"], rtmp_stream=True))
                  except: pass
                  call = await client(functions.phone.GetGroupCallStreamRtmpUrlRequest(peer=entity, revoke=False))
                  full_rtmp = f"{call.url}{call.key}"

              await client.send_message(TARGET_CHAT, f"🎬 **STREAMING STARTED**\n🏷 `{meta['title']}`\n💬 Subtitle: `{'Indonesia' if meta['sub_idx'] != -1 else 'None'}`\n🎨 Custom Fonts: `{'Yes' if font_path else 'No'}`")
              await client.disconnect()

              last_ts = "00:00:00"
              while True:
                  vf = []
                  if QUALITY == "1080p": vf.append("scale=1920:-2")
                  
                  if meta["sub_idx"] != -1:
                      # Menggunakan index si=X sesuai stream subtitle yang ketemu
                      sub_f = f"subtitles='{VIDEO_INPUT}':si={meta['sub_idx']}"
                      if font_path: sub_f += f":fontsdir='{font_path}'"
                      vf.append(sub_f)

                  cmd = ["ffmpeg", "-y", "-re"]
                  if IS_LOCAL_FILE and last_ts != "00:00:00": cmd.extend(["-ss", last_ts])
                  cmd.extend(["-i", VIDEO_INPUT])
                  if vf: cmd.extend(["-vf", ",".join(vf)])
                  
                  br = "5000k" if QUALITY == "1080p" else "3500k"
                  cmd.extend(["-c:v", "libx264", "-preset", "veryfast", "-b:v", br, "-maxrate", br, "-bufsize", "8000k",
                              "-pix_fmt", "yuv420p", "-g", "60", "-c:a", "aac", "-b:a", "128k", "-f", "flv", full_rtmp])

                  proc = subprocess.Popen(cmd, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, universal_newlines=True)
                  for line in proc.stdout:
                      t = re.search(r"time=(\d{2}:\d{2}:\d{2})", line)
                      if t: last_ts = t.group(1)
                      if "frame=" in line: print(f"\rStreaming: {last_ts} | Subs: {meta['sub_idx']}", end="")
                  
                  if proc.wait() == 0: break
                  print(f"\n⚠️ Reconnecting..."); await asyncio.sleep(5)

          if __name__ == '__main__':
              asyncio.run(main())
          EOF
          python3 streamer.py
