Name: Nobar Stream All-in-One (With Subtitle)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link, Link Google Drive, atau M3U8'
        required: true
        default: 'https://drive.google.com/uc?id=1ddFW6aV5dJxhV2wdfmEFf4K48d4G9MFA&export=download'
      quality:
        description: 'Kualitas Video'
        required: true
        type: choice
        options:
          - '1080p'
          - 'auto'
        default: 'auto'
      use_subtitle:
        description: 'Gunakan Subtitle Indonesia (Jika ada)?'
        required: true
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'true'
      custom_rtmp:
        description: 'Custom RTMP (Kosongkan jika ke Telegram)'
        required: false
        default: ''

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg aria2
          pip install telethon requests

      - name: Smart Download & Auto Streamer
        env:
          API_ID: 27095962
          API_HASH: '2a6a2a3d4bb616f254325bdc5007496d'
          STRING_SESSION: '1BVtsOHABu8YLZZ-e0n0HBjd7CZHOtCIreRto5IulVtonWOjACzFNaw2VtcsLyIwserSdDdldwIIxJ0rfKciVSWiWSsEwgvSKJZ4T5Dven4qjp_9n5IwITQjy4nERcjlpzDEO8F6UUuJchb3_L3Gjrck8r0G74GaZVMgP-Ufwf86wklONhtp96-N0sQSKlAVZVn2mdDFd81vjPyfiO5mATUnWJza2jFW-dlbWwXFaQ4HQ2z7y36QWMIfGjfZdk4Svhtv4DqhALDzQ_niujQRvHNRhAWroxeNhyZMPAG2klPfSMeRjsl8wfx3I0k2oVcLFasAZFIy8FFwKZvb6vxC-l01L4spV54c='
          TARGET_CHAT: 'aiahwhsushe'
          CUSTOM_RTMP: ${{ github.event.inputs.custom_rtmp }}
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          QUALITY: ${{ github.event.inputs.quality }}
          USE_SUBTITLE: ${{ github.event.inputs.use_subtitle }}
        run: |
          cat << 'EOF' > streamer.py
          import asyncio
          import os
          import subprocess
          import re
          import json
          import requests
          from pathlib import Path
          from urllib.parse import urlparse, unquote
          from telethon import TelegramClient, functions
          from telethon.sessions import StringSession

          API_ID = int(os.environ.get("API_ID"))
          API_HASH = os.environ.get("API_HASH")
          STRING_SESSION = os.environ.get("STRING_SESSION")
          TARGET_CHAT = os.environ.get("TARGET_CHAT")
          CUSTOM_RTMP = os.environ.get("CUSTOM_RTMP", "").strip()
          VIDEO_URL = os.environ.get("VIDEO_URL", "").strip()
          QUALITY = os.environ.get("QUALITY", "auto").strip()
          USE_SUBTITLE = os.environ.get("USE_SUBTITLE", "false").lower() == "true"

          STREAM_METHOD = "direct_stream"
          VIDEO_INPUT = VIDEO_URL
          IS_LOCAL_FILE = False

          def sanitize_filename(name):
              name = re.sub(r'[\\/:*?"<>|]+', ' ', name)
              name = re.sub(r'\s+', ' ', name).strip()
              return name or "film_lokal"

          def guess_ext_from_url(url):
              parsed = urlparse(url)
              suffix = Path(unquote(parsed.path)).suffix.lower()
              if suffix in [".mp4", ".mkv", ".mov", ".webm", ".m4v", ".ts"]:
                  return suffix
              return ".mp4"

          def get_drive_direct_url(video_url):
              session = requests.Session()
              drive_match = re.search(r'(?:id=|\/d\/)([a-zA-Z0-9_-]{25,})', video_url)
              if drive_match:
                  file_id = drive_match.group(1)
                  base_url = "https://drive.google.com/uc?export=download"
                  res = session.get(base_url, params={'id': file_id}, allow_redirects=True)
                  confirm_token = ""
                  for key, value in session.cookies.get_dict().items():
                      if key.startswith("download_warning"):
                          confirm_token = value
                  if not confirm_token:
                      match = re.search(r'name="confirm" value="([^"]+)"', res.text)
                      confirm_token = match.group(1) if match else "t"
                  uuid_match = re.search(r'name="uuid" value="([^"]+)"', res.text)
                  uuid = uuid_match.group(1) if uuid_match else ""
                  return (f"https://drive.usercontent.google.com/download?id={file_id}&export=download&confirm={confirm_token}&uuid={uuid}", session.cookies.get_dict())
              return video_url, {}

          # Identifikasi Link
          if ".m3u8" in VIDEO_URL.lower():
              print("🔍 Deteksi: Link M3U8. Menggunakan metode Direct Stream.")
              STREAM_METHOD = "direct_stream"
          else:
              print("🔍 Deteksi: File Video/Google Drive. Menggunakan metode Download First.")
              STREAM_METHOD = "download_first"

          if STREAM_METHOD == "download_first":
              filename = f"film_lokal{guess_ext_from_url(VIDEO_URL)}"
              VIDEO_INPUT = filename
              IS_LOCAL_FILE = True
              if "drive.google.com" in VIDEO_URL or "drive.usercontent.google.com" in VIDEO_URL:
                  download_url, cookies = get_drive_direct_url(VIDEO_URL)
              else:
                  download_url, cookies = VIDEO_URL, {}
              cookie_str = "; ".join([f"{k}={v}" for k, v in cookies.items()])
              print(f"🚀 Memulai download ke {filename}...")
              cmd = ["aria2c", "-c", "-x", "16", "-s", "16", "-j", "5", "--summary-interval=0", "--auto-file-renaming=false"]
              if cookie_str: cmd.append(f"--header=Cookie: {cookie_str}")
              cmd.extend(["-o", filename, download_url])
              subprocess.run(cmd, check=True)
              print("✅ Download selesai!")

          def get_video_metadata():
              print("📦 Memindai metadata dan subtitle...")
              cmd = ["ffprobe", "-v", "quiet", "-print_format", "json", "-show_format", "-show_streams", VIDEO_INPUT]
              
              info = {
                  "title": "Unknown Title",
                  "meta": "Tidak diketahui",
                  "duration": "Tidak diketahui",
                  "quality": "Unknown",
                  "height": 0,
                  "sub_index": -1,
                  "sub_lang": "Tidak ada"
              }

              try:
                  res = subprocess.run(cmd, capture_output=True, text=True, check=True)
                  data = json.loads(res.stdout)
                  
                  # 1. Video Info
                  video_streams = [s for s in data.get("streams", []) if s.get("codec_type") == "video"]
                  if video_streams:
                      best = sorted(video_streams, key=lambda x: x.get("height", 0), reverse=True)[0]
                      info["height"] = best.get("height", 0)
                      info["quality"] = f"{info['height']}p"
                      info["meta"] = f"{best.get('width')}x{best.get('height')} ({str(best.get('codec_name')).upper()})"

                  # 2. Subtitle Info (Cari Indonesia)
                  if USE_SUBTITLE:
                      sub_streams = [s for s in data.get("streams", []) if s.get("codec_type") == "subtitle"]
                      for i, sub in enumerate(sub_streams):
                          lang = sub.get("tags", {}).get("language", "").lower()
                          title = sub.get("tags", {}).get("title", "").lower()
                          if any(x in lang for x in ["ind", "id"]) or any(x in title for x in ["indonesia", "indo"]):
                              info["sub_index"] = i
                              info["sub_lang"] = "Indonesia (Internal)"
                              break

                  # 3. Title & Duration
                  fmt = data.get("format", {})
                  info["title"] = sanitize_filename(fmt.get("tags", {}).get("title") or Path(VIDEO_INPUT).stem)
                  dur = float(fmt.get("duration", 0))
                  if dur > 0:
                      m, s = divmod(int(dur), 60); h, m = divmod(m, 60)
                      info["duration"] = f"{h:02d}:{m:02d}:{s:02d}"

              except Exception as e:
                  print(f"⚠️ Gagal scan metadata: {e}")
              return info

          async def start_stream():
              client = TelegramClient(StringSession(STRING_SESSION), API_ID, API_HASH)
              await client.connect()
              
              info = get_video_metadata()
              full_rtmp = CUSTOM_RTMP

              if not full_rtmp:
                  entity = await client.get_entity(TARGET_CHAT)
                  try:
                      await client(functions.phone.CreateGroupCallRequest(peer=entity, title=info["title"][:120], rtmp_stream=True))
                  except: pass
                  call = await client(functions.phone.GetGroupCallStreamRtmpUrlRequest(peer=entity, revoke=False))
                  full_rtmp = f"{call.url}{call.key}"

              sub_status = info["sub_lang"] if info["sub_index"] != -1 else ("❌ Tidak ditemukan" if USE_SUBTITLE else "Off")
              
              msg = (
                  f"🎬 **STREAMING DIMULAI**\n\n"
                  f"🏷 **Judul:** `{info['title']}`\n"
                  f"🎥 **Kualitas:** `{info['quality']}`\n"
                  f"⏱ **Durasi:** `{info['duration']}`\n"
                  f"💬 **Subtitle:** `{sub_status}`\n"
                  f"🍿 *Selamat menonton!*"
              )
              await client.send_message(TARGET_CHAT, msg)
              await client.disconnect()
              return full_rtmp, info

          async def main():
              rtmp_url, info = await start_stream()
              if not rtmp_url: return

              last_ts = "00:00:00"
              while True:
                  ffmpeg_cmd = ["ffmpeg", "-y", "-re"]
                  if IS_LOCAL_FILE and last_ts != "00:00:00": ffmpeg_cmd.extend(["-ss", last_ts])
                  
                  ffmpeg_cmd.extend(["-i", VIDEO_INPUT])

                  # Video Filter Logic (Scaling + Subtitles)
                  vf_filters = []
                  if QUALITY == "1080p":
                      vf_filters.append("scale=1920:-2")
                  
                  if info["sub_index"] != -1:
                      # Menambahkan filter subtitle. 
                      # Karena kita menggunakan file lokal, formatnya: subtitles=filename:si=index
                      vf_filters.append(f"subtitles='{VIDEO_INPUT}':si={info['sub_index']}")

                  # Video Settings
                  ffmpeg_cmd.extend(["-map", "0:v:0", "-map", "0:a:0?"])
                  if vf_filters:
                      ffmpeg_cmd.extend(["-vf", ",".join(vf_filters)])

                  # Encoding
                  v_bitrate = "5000k" if QUALITY == "1080p" else "3500k"
                  ffmpeg_cmd.extend([
                      "-c:v", "libx264", "-preset", "veryfast",
                      "-b:v", v_bitrate, "-maxrate", v_bitrate, "-bufsize", "8000k",
                      "-pix_fmt", "yuv420p", "-g", "60",
                      "-c:a", "aac", "-b:a", "128k", "-ac", "2", "-ar", "44100",
                      "-f", "flv", rtmp_url
                  ])

                  proc = subprocess.Popen(ffmpeg_cmd, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, universal_newlines=True)
                  for line in proc.stdout:
                      match = re.search(r"time=(\d{2}:\d{2}:\d{2})", line)
                      if match: last_ts = match.group(1)
                      if "frame=" in line: print(f"\rStatus: Streaming | Time: {last_ts} | Subs: {info['sub_lang']}", end="")

                  proc.wait()
                  if proc.returncode == 0: break
                  print(f"\n⚠️ Reconnecting dari {last_ts}..."); await asyncio.sleep(5)

          if __name__ == '__main__':
              asyncio.run(main())
          EOF
          python3 streamer.py
