name: Nobar Userbot Fixed

on:
  workflow_dispatch:

jobs:
  userbot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      API_ID: 27095962
      API_HASH: "2a6a2a3d4bb616f254325bdc5007496d"
      STRING_SESSION: "1BVtsOHABu8YLZZ-e0n0HBjd7CZHOtCIreRto5IulVtonWOjACzFNaw2VtcsLyIwserSdDdldwIIxJ0rfKciVSWiWSsEwgvSKJZ4T5Dven4qjp_9n5IwITQjy4nERcjlpzDEO8F6UUuJchb3_L3Gjrck8r0G74GaZVMgP-Ufwf86wklONhtp96-N0sQSKlAVZVn2mdDFd81vjPyfiO5mATUnWJza2jFW-dlbWwXFaQ4HQ2z7y36QWMIfGjfZdk4Svhtv4DqhALDzQ_niujQRvHNRhAWroxeNhyZMPAG2klPfSMeRjsl8wfx3I0k2oVcLFasAZFIy8FFwKZvb6vxC-l01L4spV54c="
    
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg aria2
          pip install telethon requests langdetect

      - name: Run Userbot
        run: |
          # --- USERBOT.PY ---
          cat << 'PYEOF' > userbot.py
          import asyncio
          import os
          import subprocess
          import sys
          from telethon import TelegramClient, events
          from telethon.sessions import StringSession

          API_ID = int(os.environ.get("API_ID"))
          API_HASH = os.environ.get("API_HASH")
          STRING_SESSION = os.environ.get("STRING_SESSION")

          client = TelegramClient(StringSession(STRING_SESSION), API_ID, API_HASH)

          # Hapus outgoing=True agar bisa dikontrol dari mana saja
          @client.on(events.NewMessage(pattern=r'^/play\s+(?P<url>\S+)\s+(?P<chat>\S+)\s+(?P<rtmp>\S+)'))
          async def play_handler(event):
              url = event.pattern_match.group('url')
              chat = event.pattern_match.group('chat')
              rtmp = event.pattern_match.group('rtmp')
              
              msg = await event.reply(f"🎬 **Menyiapkan Streaming...**\n\n**URL:** `{url}`\n**Target:** `{chat}`")
              
              env = os.environ.copy()
              env["VIDEO_URL"] = url
              env["TARGET_CHAT"] = chat
              env["CUSTOM_RTMP"] = rtmp
              
              # Bersihkan proses lama
              subprocess.run(["pkill", "-f", "ffmpeg"], capture_output=True)
              subprocess.run(["pkill", "-f", "aria2c"], capture_output=True)
              subprocess.run(["pkill", "-f", "streamer_worker.py"], capture_output=True)

              subprocess.Popen([sys.executable, "streamer_worker.py"], env=env)
              await msg.edit("✅ **Proses streaming dimulai di background!**\nCek log di GitHub Actions untuk detail.")

          @client.on(events.NewMessage(pattern=r'^/stop'))
          async def stop_handler(event):
              subprocess.run(["pkill", "-f", "ffmpeg"], capture_output=True)
              subprocess.run(["pkill", "-f", "aria2c"], capture_output=True)
              subprocess.run(["pkill", "-f", "streamer_worker.py"], capture_output=True)
              await event.reply("🛑 **Semua streaming telah dihentikan!**")

          async def main():
              await client.start()
              print("Bot Online! Kirim /play di Telegram.")
              await client.run_until_disconnected()

          if __name__ == '__main__':
              asyncio.run(main())
          PYEOF

          # --- STREAMER_WORKER.PY ---
          cat << 'PYEOF' > streamer_worker.py
          import os
          import subprocess
          import time
          
          VIDEO_URL = os.environ.get("VIDEO_URL")
          RTMP = os.environ.get("CUSTOM_RTMP")
          FILENAME = "video.mkv"

          def run():
              # 1. Download menggunakan aria2
              print(f"Downloading: {VIDEO_URL}")
              dl_cmd = ["aria2c", "-x", "16", "-s", "16", "-o", FILENAME, VIDEO_URL]
              res = subprocess.run(dl_cmd)
              
              if res.returncode != 0:
                  print("Download Gagal! Cek URL atau Disk Space.")
                  return

              # 2. Streaming menggunakan FFmpeg
              print(f"Streaming to: {RTMP}")
              # Setting FFmpeg dioptimalkan untuk RTMP Telegram (RTMPS)
              ffmpeg_cmd = [
                  "ffmpeg", "-re", "-i", FILENAME,
                  "-c:v", "libx264", "-preset", "veryfast", "-b:v", "3000k", "-maxrate", "3000k", "-bufsize", "6000k",
                  "-pix_fmt", "yuv420p", "-g", "60",
                  "-c:a", "aac", "-b:a", "128k", "-ar", "44100",
                  "-f", "flv", RTMP
              ]
              subprocess.run(ffmpeg_cmd)

          if __name__ == '__main__':
              run()
          PYEOF
          
          python3 userbot.py
