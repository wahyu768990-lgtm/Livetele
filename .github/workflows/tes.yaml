name: Nobar Stream Pro

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link Video (MKV/MP4)'
        required: true
        default: 'https://tipigd.tipikug.workers.dev/0:/Me/Pencarian.Terakhir.2025.1080p.NF.WEB-DL.DDP5.1.H.264-KQRM.mkv'
      custom_rtmp:
        description: 'Custom RTMP URL (Kosongkan jika ingin auto ke Telegram)'
        required: false
        default: ''

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360 

    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg aria2
          pip install telethon

      - name: Download Video
        run: |
          # Menggunakan aria2 agar download lebih ngebut
          aria2c -x 16 -s 16 -o "film_lokal.mkv" "${{ github.event.inputs.video_url }}"

      - name: Run Auto Streamer
        env:
          API_ID: 27095962
          API_HASH: '2a6a2a3d4bb616f254325bdc5007496d'
          STRING_SESSION: '1BVtsOHABu8YLZZ-e0n0HBjd7CZHOtCIreRto5IulVtonWOjACzFNaw2VtcsLyIwserSdDdldwIIxJ0rfKciVSWiWSsEwgvSKJZ4T5Dven4qjp_9n5IwITQjy4nERcjlpzDEO8F6UUuJchb3_L3Gjrck8r0G74GaZVMgP-Ufwf86wklONhtp96-N0sQSKlAVZVn2mdDFd81vjPyfiO5mATUnWJza2jFW-dlbWwXFaQ4HQ2z7y36QWMIfGjfZdk4Svhtv4DqhALDzQ_niujQRvHNRhAWroxeNhyZMPAG2klPfSMeRjsl8wfx3I0k2oVcLFasAZFIy8FFwKZvb6vxC-l01L4spV54c='
          TARGET_CHAT: 'aiahwhsushe'
          CUSTOM_RTMP: ${{ github.event.inputs.custom_rtmp }}
        run: |
          cat << 'EOF' > streamer.py
          import asyncio
          import os
          import subprocess
          import re
          from telethon import TelegramClient, functions
          from telethon.sessions import StringSession

          API_ID = int(os.environ.get("API_ID"))
          API_HASH = os.environ.get("API_HASH")
          STRING_SESSION = os.environ.get("STRING_SESSION")
          TARGET_CHAT = os.environ.get("TARGET_CHAT")
          CUSTOM_RTMP = os.environ.get("CUSTOM_RTMP")
          VIDEO_PATH = "film_lokal.mkv"

          async def get_rtmp_link():
              if CUSTOM_RTMP and CUSTOM_RTMP.strip():
                  print(f"--- MENGGUNAKAN CUSTOM RTMP: {CUSTOM_RTMP} ---")
                  return CUSTOM_RTMP
              
              print("--- MENGAMBIL RTMP DARI TELEGRAM ---")
              client = TelegramClient(StringSession(STRING_SESSION), API_ID, API_HASH)
              await client.connect()
              
              if not await client.is_user_authorized():
                  print("Error: Session Telegram Invalid!")
                  return None

              try:
                  entity = await client.get_entity(TARGET_CHAT)
                  try:
                      # Mencoba membuat call baru jika belum ada
                      await client(functions.phone.CreateGroupCallRequest(
                          peer=entity, title="NOBAR FILM", rtmp_stream=True
                      ))
                  except Exception:
                      pass

                  call_info = await client(functions.phone.GetGroupCallStreamRtmpUrlRequest(
                      peer=entity, revoke=False
                  ))
                  return f"{call_info.url}{call_info.key}"
              except Exception as e:
                  print(f"Error Telethon: {e}")
                  return None
              finally:
                  await client.disconnect()

          async def main():
              full_rtmp = await get_rtmp_link()
              if not full_rtmp:
                  return

              last_timestamp = "00:00:00"

              while True:
                  # FFmpeg Command dengan Perbaikan Audio
                  ffmpeg_cmd = [
                      "ffmpeg", 
                      "-ss", last_timestamp,      # Resume dari detik terakhir jika terputus
                      "-re",                      # Baca file secara Realtime
                      "-i", VIDEO_PATH,
                      "-map", "0:v:0",            # Paksa ambil track video pertama
                      "-map", "0:a:0",            # Paksa ambil track audio pertama
                      "-vf", "scale=1280:-2",     # Resize ke 720p (hemat bandwidth)
                      "-c:v", "libx264", 
                      "-preset", "veryfast", 
                      "-b:v", "2500k", 
                      "-maxrate", "2500k", 
                      "-bufsize", "5000k",
                      "-pix_fmt", "yuv420p", 
                      "-g", "60",                 # Keyframe interval
                      "-c:a", "aac",              # Convert audio ke AAC
                      "-b:a", "128k", 
                      "-ac", "2",                 # FIX: Downmix 5.1 ke Stereo (2 Channel) agar suara muncul
                      "-ar", "44100", 
                      "-af", "aresample=async=1", # Sinkronisasi Audio-Video
                      "-f", "flv", 
                      full_rtmp
                  ]

                  process = subprocess.Popen(ffmpeg_cmd, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, universal_newlines=True)
                  
                  for line in process.stdout:
                      # Ambil log timestamp untuk fitur auto-resume
                      match = re.search(r"time=(\d{2}:\d{2}:\d{2})", line)
                      if match:
                          last_timestamp = match.group(1)
                      
                      if "frame=" in line:
                          print(f"\rStreaming di posisi: {last_timestamp}", end="")
                      else:
                          # Print log lain jika penting (error dsb)
                          if "Error" in line or "failed" in line:
                              print(f"\nLog: {line.strip()}")

                  process.wait()

                  if process.returncode == 0:
                      print("\n--- Film Selesai Ditayangkan ---")
                      break
                  else:
                      print(f"\n--- Koneksi Terputus. Mencoba Reconnecting dari {last_timestamp}... ---")
                      await asyncio.sleep(5)

          if __name__ == '__main__':
              asyncio.run(main())
          EOF
          python3 streamer.py
